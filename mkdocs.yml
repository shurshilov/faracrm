site_name: FARA CRM Documentation
site_description: Внутренняя документация FARA CRM
site_url: https://docs.fara.dev
docs_dir: docs/dist
site_dir: docs/site

theme:
  name: material
  language: ru
  logo: assets/logo-mark.svg
  favicon: assets/logo-mark.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Светлая тема
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/git-alt

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - ru
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: ru
          default: true
          name: Русский
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Главная: Home
            Бэкенд: Backend
            Архитектура: Architecture
            "Сервис — базовый класс модулей": "Service — base class for modules"
            "Окружение (Environment)": "Environment"
            DotORM: DotORM
            Модели: Models
            Поля: Fields
            Запросы: Queries
            Связи: Relations
            "CRUD Auto — автогенерация REST API": "CRUD Auto — REST API auto-generation"
            Безопасность и доступы: "Security and access"
            Модуль безопасности: "Security Module"
            Роли и правила: "Roles and rules"
            Иерархия пользователей: "User hierarchy"
            Чат и звонки: "Chat and calls"
            Модуль чата: "Chat Module"
            Архитектура чата: "Chat architecture"
            "Звонки и push-wake": "Calls and push-wake"
            Вложения: Attachments
            Обзор: Overview
            Локальное хранилище: "Local storage"
            Google Drive: "Google Drive"
            Яндекс.Диск: "Yandex Disk"
            Системные сервисы: "System services"
            "Планировщик задач (Cron)": "Cron — task scheduler"
            "Активности (Activity)": "Activity — tasks and deadlines"
            Тестирование: Testing
            Юнит-тесты: "Unit tests"
            Интеграционные тесты: "Integration tests"
            "E2E (Playwright)": "E2E (Playwright)"
            Производительность: Performance
            Безопасность: Security
            Фронтенд: Frontend
            Управление состоянием: "State management"
            Модули: Modules
            Сервисы: Services
            "CRUD API сервис": "CRUD API service"
            Гайды: Guides
            "Создание нового модуля": "Creating a new module"
            "WebSocket — события в реальном времени": "WebSocket — real-time events"
            "Деплой и proxy": "Deployment and proxy"

nav:
  - Главная: index.md

  - Бэкенд:
      - backend/index.md
      - Архитектура:
          - Обзор: backend/architecture/overview.md
          - Сервис — базовый класс модулей: backend/architecture/services.md
          - Окружение (Environment): backend/architecture/environment.md
      - DotORM:
          - backend/dotorm/index.md
          - Модели: backend/dotorm/models.md
          - Поля: backend/dotorm/fields.md
          - Запросы: backend/dotorm/queries.md
          - Связи: backend/dotorm/relations.md
          - CRUD Auto — автогенерация REST API: backend/dotorm/crud-auto.md
      - Безопасность и доступы:
          - Модуль безопасности: backend/modules/security.md
          - Роли и правила: backend/security/roles-and-rules.md
          - Иерархия пользователей: backend/security/hierarchy.md
      - Чат и звонки:
          - Модуль чата: backend/modules/chat.md
          - Архитектура чата: backend/modules/chat-architecture.md
          - Звонки и push-wake: backend/modules/calls.md
      - Вложения:
          - Обзор: backend/attachments/index.md
          - Локальное хранилище: backend/attachments/filestore.md
          - Google Drive: backend/attachments/google.md
          - Яндекс.Диск: backend/attachments/yandex.md
      - Системные сервисы:
          - Планировщик задач (Cron): backend/system/cron.md
          - Активности (Activity): backend/system/activity.md
      - Тестирование:
          - backend/testing/index.md
          - Юнит-тесты: backend/testing/unit.md
          - Интеграционные тесты: backend/testing/integration.md
          - E2E (Playwright): backend/testing/e2e.md
          - Производительность: backend/testing/performance.md
          - Безопасность: backend/testing/security.md

  - Фронтенд:
      - frontend/index.md
      - Архитектура:
          - Обзор: frontend/architecture/overview.md
          - Управление состоянием: frontend/architecture/state.md
      - Модули:
          - Модуль чата: frontend/modules/chat.md
      - Сервисы:
          - CRUD API сервис: frontend/services/crud-api.md

  - Гайды:
      - guides/index.md
      - Создание нового модуля: guides/new-module.md
      - WebSocket — события в реальном времени: guides/websocket.md
      - Деплой и proxy: guides/deploy.md
