# =============================================================
# FARA CRM — nginx конфиг
#
# Структура:
#   - / (SPA): React-приложение из /usr/share/nginx/html
#   - /api/ → backend FastAPI (uvicorn) на backend:8000
#   - /ws/  → WebSocket к тому же бэкенду
#   - /docs-dev/ → bundled API docs (dev)
#
# Безопасность через response headers (см. секцию ниже).
# Для production предполагается HTTPS-терминация выше (Traefik/
# Cloudflare/ELB). Если nginx крайний — добавить server { listen 443
# ssl; ... } и редирект с 80 → 443.
# =============================================================

# Скрыть версию nginx из заголовков и страниц ошибок
server_tokens off;

# Картинки/PDF не жмём — уже сжаты.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    application/json
    application/javascript
    application/xml
    text/css
    text/javascript
    text/plain
    text/xml
    image/svg+xml
    font/woff2;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 150M = 100М attachment + ~33% накладных от base64 + запас.
    # Если business-case требует больше — увеличить и здесь, и в
    # system_settings.attachments.max_size_bytes на бэке.
    client_max_body_size 150M;
    client_body_timeout 300s;

    # nosniff: запрещает браузеру MIME-sniffing — ключевая защита
    # от XSS-через-attachment (HTML/SVG, отправленный с фейковым MIME).
    add_header X-Content-Type-Options "nosniff" always;

    # Защита от clickjacking — нашу страницу нельзя засунуть в чужой iframe.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Не утекать полные URL во внешние ссылки и картинки.
    # На свой домен — полный URL. На чужой — только origin. С https на http — ничего.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Отключаем браузерные API, которые приложение не использует.
    # Если используете geolocation/camera/mic — убрать соответствующие пункты.
    # add_header Permissions-Policy
    #     "geolocation=(), microphone=(), camera=(), payment=()" always;

    # ВАЖНО про "always": без него nginx добавляет add_header только к
    # 2xx/3xx ответам. Хочется иметь заголовки и на 4xx/5xx (страницы
    # ошибок тоже могут пытаться эксплуатировать).

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Таймауты под загрузку файлов и долгие отчёты.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Не буферизуем ответы бэкенда — для streaming (например,
        # при скачивании большого attachment) и для предсказуемой
        # latency.
        proxy_buffering off;
    }

    # =========================================================
    # WebSocket → backend
    # =========================================================
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;

        # Upgrade-семантика для WS
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Клиентский контекст
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WS-сессии живут долго (чат). 1 сутки.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Для WS буферизация ОБЯЗАТЕЛЬНО выключена — иначе сообщения
        # от сервера копятся в буфере nginx и не доезжают до клиента.
        proxy_buffering off;
    }

  location /docs-dev/ {
        proxy_pass http://backend:8000/docs-dev/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика с хешированными именами (Vite кладёт hash в filename) —
    # кэшируем агрессивно, immutable. Размещаем ВЫШЕ "location /",
    # чтобы regex отработал первым по приоритету nginx.
    #
    # Внимание: SVG здесь — это статика приложения (иконки в bundle),
    # она безопасна и кэшируется. SVG-attachments идут через /api/ и
    # подчиняются другим правилам (см. секцию выше про nosniff).
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|webp|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        # Дублируем security headers — add_header в location полностью
        # переопределяет add_header из server { }, поэтому повторяем.
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # index.html — НЕ кэшировать. Иначе после деплоя пользователь видит
    # старый index.html, который ссылается на несуществующие хешированные
    # бандлы → белый экран.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        try_files $uri =404;
    }

    # SPA fallback: всё остальное → index.html (React Router сам разберётся).
    location / {
        try_files $uri $uri/ /index.html;
    }
}