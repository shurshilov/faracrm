<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    FARA brand mark — стилизованная "F" с акцентом скорости.
    Зелёный градиент совпадает с #009982 в основном logo.svg.
    Угловой "слэш" сверху + наклонная горизонталь намекают на скорость / motion.
  -->
  <defs>
    <linearGradient id="fara-f-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b89b"/>
      <stop offset="100%" stop-color="#007868"/>
    </linearGradient>
  </defs>

  <!-- Скруглённый зелёный квадрат-фон -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#fara-f-grad)"/>

  <!-- Буква F с motion-style: левая вертикаль, верхняя горизонталь со скосом, средняя горизонталь со скосом -->
  <g fill="white">
    <!-- Вертикаль -->
    <rect x="16" y="14" width="9" height="36" rx="1.5"/>
    <!-- Верхняя перекладина с наклонным правым краем (motion-эффект) -->
    <path d="M16 14 L46 14 L42 22 L16 22 Z"/>
    <!-- Средняя перекладина короче и тоже со скосом -->
    <path d="M16 30 L38 30 L34 38 L16 38 Z"/>
  </g>
</svg>
